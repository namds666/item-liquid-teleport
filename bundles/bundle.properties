block.item-liquid-teleport-chrono-unloader.name = Chrono Unloader
block.item-liquid-teleport-chrono-unloader.description = Pulls a chosen item from all linked buildings in range and outputs it through conveyors.
block.item-liquid-teleport-chrono-pusher.name = Chrono Pusher
block.item-liquid-teleport-chrono-pusher.description = Pushes all stored items into linked buildings in range.
block.item-liquid-teleport-chrono-liquid-unloader.name = Chrono Liquid Unloader
block.item-liquid-teleport-chrono-liquid-unloader.description = Pulls a chosen liquid from all linked buildings in range and outputs it through pipes.
block.item-liquid-teleport-chrono-liquid-pusher.name = Chrono Liquid Pusher
block.item-liquid-teleport-chrono-liquid-pusher.description = Pushes a chosen liquid into all linked buildings in range.
unit.item-liquid-teleport-chrono-medic.name = Chrono Medic
unit.item-liquid-teleport-chrono-medic.description = An autonomous flying medic. Seeks out nearby injured friendly units and heals them at 200 hp/s. Cannot be player-controlled.
block.item-liquid-teleport-chrono-build-tower.name = Chrono Build Tower
block.item-liquid-teleport-chrono-build-tower.description = Repairs and builds all friendly structures within 100 tiles. Requires no power or resources to operate.
