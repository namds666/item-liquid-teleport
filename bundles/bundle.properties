block.item-liquid-teleport-chrono-unloader.name = Chrono Unloader
block.item-liquid-teleport-chrono-unloader.description = Pulls a chosen item from all linked buildings globally and outputs it through conveyors.
block.item-liquid-teleport-chrono-pusher.name = Chrono Pusher
block.item-liquid-teleport-chrono-pusher.description = Pushes all stored items into linked buildings globally.
block.item-liquid-teleport-chrono-liquid-unloader.name = Chrono Liquid Unloader
block.item-liquid-teleport-chrono-liquid-unloader.description = Pulls a chosen liquid from all linked buildings globally and outputs it through pipes.
block.item-liquid-teleport-chrono-liquid-pusher.name = Chrono Liquid Pusher
block.item-liquid-teleport-chrono-liquid-pusher.description = Pushes a chosen liquid into all linked buildings globally.
block.item-liquid-teleport-chrono-core.name = Chrono Core
block.item-liquid-teleport-chrono-core.description = A 1x1 cheat-grade core that is always unlocked and produces gamma units.
block.item-liquid-teleport-chrono-mender.name = Chrono Mender
block.item-liquid-teleport-chrono-mender.description = Heals all friendly structures globally to full health twice per second. Requires no power or resources to operate.
block.item-liquid-teleport-chrono-repair-point.name = Chrono Repair Point
block.item-liquid-teleport-chrono-repair-point.description = Repairs damaged friendly units globally for 50% max health per second with a continuous beam.
block.item-liquid-teleport-chrono-build-tower.name = Chrono Build Tower
block.item-liquid-teleport-chrono-build-tower.description = Automatically rebuilds structures globally and assists construction with vanilla build tower logic.
block.item-liquid-teleport-chrono-booster.name = Chrono Booster
block.item-liquid-teleport-chrono-booster.description = A 1x1 overdrive dome that accepts extra items and liquids for additive range and speed boosts.
block.item-liquid-teleport-chrono-buffer.name = Chrono Buffer
block.item-liquid-teleport-chrono-buffer.description = Applies allied unit buffs in range. Extra items and liquids increase radius, duration, and the number of unlocked custom statuses.
block.item-liquid-teleport-chrono-debuffer.name = Chrono Debuffer
block.item-liquid-teleport-chrono-debuffer.description = Applies stacked negative status effects to enemy units in range. Extra items and liquids increase radius and status duration.
