block.item-liquid-teleport-chrono-unloader.name = 时空提取器
block.item-liquid-teleport-chrono-unloader.description = 从范围内所有已连接的建筑物中提取选定的物品，并通过传送带输出。
block.item-liquid-teleport-chrono-pusher.name = 时空推送器
block.item-liquid-teleport-chrono-pusher.description = 将所有存储的物品推送到范围内已连接的建筑物中。
block.item-liquid-teleport-chrono-liquid-unloader.name = 时空液体提取器
block.item-liquid-teleport-chrono-liquid-unloader.description = 从范围内所有已连接的建筑物中提取选定的液体，并通过管道输出。
block.item-liquid-teleport-chrono-liquid-pusher.name = 时空液体推送器
block.item-liquid-teleport-chono-liquid-pusher.description = 将选定的液体推送到范围内所有相连的建筑中。
block.item-liquid-teleport-chrono-mender.name = 时空修复器
block.item-liquid-teleport-chrono-mender.description = 每秒两次将全图所有友方建筑的生命值恢复至满值。无需能量或资源即可运行。
block.item-liquid-teleport-chrono-repair-point.name = 时空修复器
block.item-liquid-teleport-chrono-repair-point.description = 与修复器完全相同，但其单位治疗范围增加至150格。
