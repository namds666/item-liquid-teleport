block.item-liquid-teleport-chrono-unloader.name = 时空提取器
block.item-liquid-teleport-chrono-unloader.description = 从范围内所有已连接的建筑物中提取选定的物品，并通过传送带输出。
block.item-liquid-teleport-chrono-pusher.name = 时空推送器
block.item-liquid-teleport-chrono-pusher.description = 将所有存储的物品推送到范围内已连接的建筑物中。
block.item-liquid-teleport-chrono-liquid-unloader.name = 时空液体提取器
block.item-liquid-teleport-chrono-liquid-unloader.description = 从范围内所有已连接的建筑物中提取选定的液体，并通过管道输出。
block.item-liquid-teleport-chrono-liquid-pusher.name = 时空液体推送器
block.item-liquid-teleport-chono-liquid-pusher.description = 将选定的液体推送到范围内所有相连的建筑中。
block.item-liquid-teleport-chrono-mender.name = 时空修复器
block.item-liquid-teleport-chrono-mender.description = 每秒两次将全图所有友方建筑的生命值恢复至满值。无需能量或资源即可运行。
block.item-liquid-teleport-chrono-repair-point.name = 时空修复器
block.item-liquid-teleport-chrono-repair-point.description = 使用持续光束全图修复受损的友方单位，每秒恢复50%最大生命值。
block.item-liquid-teleport-chrono-build-tower.name = 时空建造塔
block.item-liquid-teleport-chrono-build-tower.description = 使用原版建造塔逻辑全图自动重建建筑并辅助建造。
block.item-liquid-teleport-chrono-booster.name = 时空增幅器
block.item-liquid-teleport-chrono-booster.description = 1x1 的超速穹顶，可消耗额外物品和液体叠加范围和速度增幅。
block.item-liquid-teleport-chrono-buffer.name = Chrono Buffer
block.item-liquid-teleport-chrono-buffer.description = Applies Overdrive, Overclock, Guardian, and Fast to allied units in range. Extra items and liquids increase radius and status duration.
block.item-liquid-teleport-chrono-debuffer.name = Chrono Debuffer
block.item-liquid-teleport-chrono-debuffer.description = Applies stacked negative status effects to enemy units in range. Extra items and liquids increase radius and status duration.
