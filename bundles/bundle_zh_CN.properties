block.item-liquid-teleport-chrono-unloader.name = 时空提取器
block.item-liquid-teleport-chrono-unloader.description = 从全图已连接建筑中提取选定物品，并通过相邻传送带输出。
block.item-liquid-teleport-chrono-pusher.name = 时空推送器
block.item-liquid-teleport-chrono-pusher.description = 接收传送带输入的物品，并将其全图推送到已连接建筑中；可选择物品过滤。
block.item-liquid-teleport-chrono-liquid-unloader.name = 时空液体提取器
block.item-liquid-teleport-chrono-liquid-unloader.description = 从全图已连接建筑中提取选定液体，并通过相邻管道输出。
block.item-liquid-teleport-chrono-liquid-pusher.name = 时空液体推送器
block.item-liquid-teleport-chrono-liquid-pusher.description = 接收管道输入的液体，并将其全图推送到已连接建筑中；可选择液体过滤。
block.item-liquid-teleport-chrono-core.name = 时空核心
block.item-liquid-teleport-chrono-core.description = 1x1 的作弊级核心，无需科技解锁，可生产伽马单位。
block.item-liquid-teleport-chrono-mender.name = 时空修复器
block.item-liquid-teleport-chrono-mender.description = 每秒两次全图治疗受损的友方建筑。无需电力或资源即可运行。
block.item-liquid-teleport-chrono-repair-point.name = 时空单位修复点
block.item-liquid-teleport-chrono-repair-point.description = 使用持续光束全图修复受损的友方单位，每秒恢复其最大生命值的 50%。
block.item-liquid-teleport-chrono-build-tower.name = 时空建造塔
block.item-liquid-teleport-chrono-build-tower.description = 使用原版建造塔逻辑，全图自动重建建筑并辅助建造。
block.item-liquid-teleport-chrono-booster.name = 时空增幅器
block.item-liquid-teleport-chrono-booster.description = 1x1 超速穹顶变体，可消耗额外物品和液体叠加范围与速度增幅。
block.item-liquid-teleport-chrono-buffer.name = 时空增益器
block.item-liquid-teleport-chrono-buffer.description = 为范围内友方单位施加增益状态。额外物品和液体会提高范围、持续时间，并解锁更多自定义状态。
block.item-liquid-teleport-chrono-debuffer.name = 时空减益器
block.item-liquid-teleport-chrono-debuffer.description = 对范围内敌方单位施加多种负面状态。额外物品和液体会提高范围和持续时间。

